version: '3.8'

services:
  stock-monitor:
    build: .
    container_name: smart-stock-monitor
    ports:
      - "8502:8501"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
      - ./.streamlit:/app/.streamlit
      - ./app.py:/app/app.py
      - ./main.py:/app/main.py
      - ./pages:/app/pages
      - ./utils:/app/utils
      - ./components:/app/components
      - ./modules:/app/modules
      - ./core:/app/core
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  redis:
    image: redis:7-alpine
    container_name: ssm-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  redis_data:
    driver: local
