name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: |
          ruff check . --select E,W,F --ignore E501,W503 --exit-zero

      - name: Syntax check
        run: |
          python -m py_compile app.py
          python -m py_compile main.py
          python -m py_compile data_router.py
          for f in pages/*.py modules/*.py; do
            python -m py_compile "$f" || true
          done

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short
        env:
          OPENAI_API_KEY: "test-key-for-ci"

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ssm:test .

      - name: Test container starts
        run: |
          docker run -d --name ssm-test -p 8501:8501 ssm:test
          sleep 10
          curl -f http://localhost:8501/_stcore/health || exit 1
          docker stop ssm-test
